<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- meaningless tags -->
    <div></div>
    <span></span>

    <!-- before semantic tags -->
    <div id="header">
      <div id="nav"></div>
    </div>
    <div id="main">this is the main section</div>
    <div id="footer">this is the footer</div>

    <!-- the semantic way -->
    <header>
      <nav></nav>
    </header>
    <main>
      <section></section>
    </main>
    <footer></footer>
  </body>
</html>
